services:
  - type: web
    name: taiwan-stock-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # 在 Render 後台手動填入
      - key: JWT_SECRET
        generateValue: true  # Render 自動產生隨機值
      - key: DB_PATH
        value: /opt/render/project/src/taiwan_stock.db
